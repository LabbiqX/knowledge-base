<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root { --bg: #ffffff; --text: #1a1a2e; --card: #f8f9fa; --border: #e0e0e0; --accent: #4361ee; --accent2: #3f37c9; --muted: #6c757d; --tag-bg: #e8eaf6; }
    [data-theme="dark"] { --bg: #0f0f23; --text: #e0e0e0; --card: #1a1a2e; --border: #2d2d44; --accent: #7c8cf8; --accent2: #a5b4fc; --muted: #9ca3af; --tag-bg: #1e1e3f; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 960px; margin: 0 auto; padding: 0 1.5rem; }
    header { border-bottom: 1px solid var(--border); padding: 1rem 0; margin-bottom: 2rem; }
    .header-inner { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 1.4rem; font-weight: 700; text-decoration: none; color: var(--accent); }
    .logo:hover { color: var(--accent2); }
    nav a { margin-left: 1.5rem; text-decoration: none; color: var(--muted); font-size: 0.9rem; }
    nav a:hover { color: var(--accent); }
    #theme-toggle { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 1rem; color: var(--text); }
    main { min-height: 70vh; }
    footer { border-top: 1px solid var(--border); padding: 1.5rem 0; margin-top: 3rem; text-align: center; color: var(--muted); font-size: 0.85rem; }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    h2 { font-size: 1.3rem; margin: 2rem 0 1rem; color: var(--accent); }
    .stats { display: flex; gap: 1.5rem; margin: 1.5rem 0; flex-wrap: wrap; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.5rem; text-align: center; }
    .stat-num { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.8rem; color: var(--muted); }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.2rem; margin-bottom: 1rem; transition: border-color 0.2s; }
    .card:hover { border-color: var(--accent); }
    .card a { text-decoration: none; color: var(--text); }
    .card-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.4rem; }
    .card-meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.5rem; }
    .card-excerpt { font-size: 0.9rem; color: var(--muted); }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 500; background: var(--tag-bg); color: var(--accent); margin-right: 0.4rem; }
    .badge-ai-agent { background: #dbeafe; color: #1d4ed8; }
    .badge-coding { background: #d1fae5; color: #065f46; }
    .badge-vibe { background: #fef3c7; color: #92400e; }
    .badge-security { background: #fee2e2; color: #991b1b; }
    .badge-rag { background: #ffedd5; color: #9a3412; }
    .badge-enterprise { background: #e5e7eb; color: #374151; }
    .badge-anthropic { background: #fce7f3; color: #9d174d; }
    .badge-openai { background: #d1fae5; color: #065f46; }
    .badge-google { background: #dbeafe; color: #1d4ed8; }
    .badge-multi { background: #ede9fe; color: #5b21b6; }
    .badge-eval { background: #ffedd5; color: #9a3412; }
    .category-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 1rem 0; }
    .category-link { text-decoration: none; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; background: var(--card); border: 1px solid var(--border); color: var(--text); transition: all 0.2s; }
    .category-link:hover { border-color: var(--accent); color: var(--accent); }
    .search-box { width: 100%; padding: 0.7rem 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; background: var(--card); color: var(--text); margin-bottom: 1.5rem; }
    .search-box:focus { outline: none; border-color: var(--accent); }
    .source-link { font-size: 0.8rem; color: var(--accent); text-decoration: none; word-break: break-all; }
    .summary-content { margin-top: 1.5rem; }
    .summary-content h2 { font-size: 1.2rem; }
    .summary-content h3 { font-size: 1.05rem; margin: 1.5rem 0 0.5rem; }
    .summary-content ul, .summary-content ol { padding-left: 1.5rem; margin: 0.5rem 0; }
    .summary-content li { margin-bottom: 0.3rem; }
    .summary-content blockquote { border-left: 3px solid var(--accent); padding-left: 1rem; margin: 1rem 0; color: var(--muted); }
    .summary-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.9rem; }
    .summary-content th, .summary-content td { border: 1px solid var(--border); padding: 0.5rem; text-align: left; }
    .summary-content code { background: var(--tag-bg); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
    .back-link { display: inline-block; margin-bottom: 1.5rem; color: var(--accent); text-decoration: none; font-size: 0.9rem; }
    @media (max-width: 600px) { .stats { flex-direction: column; } .header-inner { flex-direction: column; gap: 0.5rem; } nav a { margin-left: 0.8rem; } }
    [data-theme="dark"] .badge-ai-agent { background: #1e3a5f; color: #93c5fd; }
    [data-theme="dark"] .badge-coding { background: #064e3b; color: #6ee7b7; }
    [data-theme="dark"] .badge-vibe { background: #78350f; color: #fcd34d; }
    [data-theme="dark"] .badge-security { background: #7f1d1d; color: #fca5a5; }
    [data-theme="dark"] .badge-rag { background: #7c2d12; color: #fdba74; }
    [data-theme="dark"] .badge-enterprise { background: #374151; color: #d1d5db; }
    [data-theme="dark"] .badge-anthropic { background: #831843; color: #f9a8d4; }
    [data-theme="dark"] .badge-openai { background: #064e3b; color: #6ee7b7; }
    [data-theme="dark"] .badge-google { background: #1e3a5f; color: #93c5fd; }
    [data-theme="dark"] .badge-multi { background: #4c1d95; color: #c4b5fd; }
    [data-theme="dark"] .badge-eval { background: #7c2d12; color: #fdba74; }
  </style>
</head>
<body>
  <header>
    <div class="container header-inner">
      <a href="{{ '/' | relative_url }}" class="logo">🔷 Jarvis Knowledge Base</a>
      <div>
        <nav style="display:inline">
          <a href="{{ '/' | relative_url }}">Ana Sayfa</a>
          <a href="{{ '/categories' | relative_url }}">Kategoriler</a>
          <a href="{{ '/search' | relative_url }}">Arama</a>
          <a href="{{ '/insights' | relative_url }}">Insights</a>
        </nav>
        <button id="theme-toggle" onclick="toggleTheme()">🌙</button>
      </div>
    </div>
  </header>
  <main class="container">
    {{ content }}
  </main>
  <footer>
    <div class="container">
      <p>🔷 Jarvis Knowledge Base — AI, teknoloji ve yazılım geliştirme üzerine küratörlü özetler</p>
      <p>{{ site.summaries | size }} özet · Son güncelleme: {{ site.time | date: "%Y-%m-%d" }}</p>
    </div>
  </footer>
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.getElementById('theme-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
    }
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
        document.getElementById('theme-toggle').textContent = saved === 'dark' ? '☀️' : '🌙';
      }
    })();
  </script>
</body>
</html>
